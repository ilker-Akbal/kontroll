<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --stroke: #dbe3ef;
        --primary: #0ea5e9;
        --danger: #dc2626;
        --success: #16a34a;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px 1fr;
      }

      .sidebar {
        background: #0f172a;
        color: #fff;
        padding: 24px 18px;
      }

      .brand {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 28px;
      }

      .brand small {
        display: block;
        font-size: 12px;
        color: #cbd5e1;
        margin-top: 6px;
        font-weight: 400;
      }

      .nav {
        display: grid;
        gap: 10px;
      }

      .nav a {
        color: #e2e8f0;
        text-decoration: none;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        transition: 0.15s ease;
      }

      .nav a:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .main {
        padding: 24px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
      }

      .topbar h1 {
        margin: 0;
        font-size: 28px;
      }

      .topbar p {
        margin: 6px 0 0 0;
        color: var(--muted);
      }

      .top-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .user-badge {
        background: var(--panel);
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        border-radius: 14px;
        padding: 10px 14px;
        font-weight: 700;
      }

      .logout-form {
        margin: 0;
      }

      .btn,
      button,
      input[type="submit"] {
        border: none;
        background: var(--primary);
        color: #fff;
        border-radius: 12px;
        padding: 12px 16px;
        cursor: pointer;
        font-weight: 700;
      }

      .btn.secondary {
        background: #e2e8f0;
        color: #0f172a;
      }

      .btn.danger {
        background: var(--danger);
      }

      .btn.success {
        background: var(--success);
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .stat {
        padding: 20px;
      }

      .stat h3 {
        margin: 0 0 8px 0;
        font-size: 15px;
        color: var(--muted);
      }

      .stat .value {
        font-size: 34px;
        font-weight: 800;
      }

      .section {
        margin-top: 22px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 22px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 14px 12px;
        border-bottom: 1px solid var(--stroke);
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .actions a,
      .actions button {
        text-decoration: none;
        display: inline-block;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
      }

      .form-grid {
        display: grid;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-weight: 700;
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        border: 1px solid var(--stroke);
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        background: #fff;
      }

      .field textarea {
        min-height: 110px;
        resize: vertical;
      }

      .muted {
        color: var(--muted);
      }

      .danger-box {
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #991b1b;
        border-radius: 14px;
        padding: 16px;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .grid-3 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          Admin Panel
          <small>Fight Detection Yönetimi</small>
        </div>

        <nav class="nav">
          <a href="{% url 'adminx:dashboard' %}">Dashboard</a>
          <a href="{% url 'adminx:camera_list' %}">Kameralar</a>
          <a href="{% url 'adminx:camera_create' %}">Yeni Kamera Ekle</a>
          <a href="{% url 'dashboard:index' %}">Güvenlik Ekranı</a>
        </nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h1>{% block page_title %}Admin Panel{% endblock %}</h1>
            <p>{% block page_desc %}Yönetim ekranı{% endblock %}</p>
          </div>

          <div class="top-actions">
            <div class="user-badge">{{ request.user.username }}</div>
            <form
              method="post"
              action="{% url 'accounts:logout' %}"
              class="logout-form"
            >
              {% csrf_token %}
              <button type="submit" class="btn danger">Çıkış Yap</button>
            </form>
          </div>
        </div>

        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
