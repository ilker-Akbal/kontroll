{% extends "base.html" %}

{% block title %}Şifre Yenile{% endblock %}

{% block content %}
<div class="account-page">
  <section class="account-panel">
    <div class="account-panel__header">
      <h2>Yeni Şifre Belirle</h2>
      <p>Hesabınız için yeni bir şifre oluşturun.</p>
    </div>

    <form method="post" class="account-form">
      {% csrf_token %}

      <div class="account-field">
        <label for="password1">Yeni Şifre</label>
        <input
          type="password"
          name="password1"
          id="password1"
          class="account-input"
          placeholder="Yeni şifrenizi girin"
          required
        />
      </div>

      <div class="account-field">
        <label for="password2">Yeni Şifre Tekrar</label>
        <input
          type="password"
          name="password2"
          id="password2"
          class="account-input"
          placeholder="Yeni şifrenizi tekrar girin"
          required
        />
      </div>

      <div class="account-actions">
        <button type="submit" class="account-primary-btn">
          Şifreyi Güncelle
        </button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
