runtime:
  show: false
  save_debug_video: true
  output_dir: "HizTespiti/yolo/out_yolo"
  resize_width: 960
  max_fps: 0

motion:
  enabled: true
  history: 500
  var_threshold: 32
  detect_shadows: true
  blur_kernel: 5
  threshold: 35
  morph_open_kernel: 3
  morph_close_kernel: 9
  dilate_iterations: 2
  min_area: 900
  max_area_ratio: 0.55
  min_motion_score: 0.004
  open_frames: 3
  close_frames: 8
  ignore_first_frames: 20

roi:
  enabled: false
  polygon: []

yolo:
  weights: "yolo11s.pt"
  device: 0
  imgsz: 640
  conf: 0.30
  iou: 0.50
  stride: 3
  vehicle_classes:
    - car
    - motorcycle
    - bus
    - truck

tracker:
  iou_threshold: 0.25
  max_age: 20
  min_hits: 2

events:
  write_jsonl: true
  min_track_age: 3