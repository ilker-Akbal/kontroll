# ============================================================
# Fight Detection — nginx subpath snippet
# ------------------------------------------------------------
# Mevcut server { listen 443 ssl; ... } bloğunun *içine* yapıştır.
# Yeni bir server bloğu açma — domain zaten mevcut projede tanımlı.
# ============================================================

location /fight-detection/media/ {
    alias /opt/fight-detection/Fight_backend_project/backend_frontend_project/media/;
    expires 7d;
    access_log off;
}

location /fight-detection/static/ {
    alias /opt/fight-detection/Fight_backend_project/backend_frontend_project/staticfiles/;
    expires 30d;
    access_log off;
}

location /fight-detection/ {
    proxy_pass http://127.0.0.1:8001;     # SLASH YOK — URI korunur (FORCE_SCRIPT_NAME ile uyumlu)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /fight-detection;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 200M;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
}
